asyncapi: 3.0.0
info:
  title: Dust Sync Protocol
  version: 0.1.0
  description: |
    Wire protocol for Dust — a reactive global map.
    Clients connect via WebSocket and sync store state
    using MessagePack or JSON serialization.

servers:
  production:
    host: api.dust.dev
    protocol: wss
    description: Production Dust server
  development:
    host: localhost:7000
    protocol: ws
    description: Local development server

defaultContentType: application/x-msgpack

channels:
  storeSync:
    address: /ws/sync
    description: |
      WebSocket endpoint for store synchronization.
      Supports subprotocols: dust.msgpack (production), dust.json (development).
    messages:
      hello:
        $ref: '#/components/messages/Hello'
      helloResponse:
        $ref: '#/components/messages/HelloResponse'
      join:
        $ref: '#/components/messages/Join'
      write:
        $ref: '#/components/messages/Write'
      writeReply:
        $ref: '#/components/messages/WriteReply'
      event:
        $ref: '#/components/messages/Event'
      error:
        $ref: '#/components/messages/Error'

operations:
  sendHello:
    action: send
    channel:
      $ref: '#/channels/storeSync'
    messages:
      - $ref: '#/channels/storeSync/messages/hello'
    description: Client sends hello to authenticate and negotiate capver.

  receiveHelloResponse:
    action: receive
    channel:
      $ref: '#/channels/storeSync'
    messages:
      - $ref: '#/channels/storeSync/messages/helloResponse'

  sendJoin:
    action: send
    channel:
      $ref: '#/channels/storeSync'
    messages:
      - $ref: '#/channels/storeSync/messages/join'
    description: Client joins a store topic, providing last known store_seq for catch-up.

  sendWrite:
    action: send
    channel:
      $ref: '#/channels/storeSync'
    messages:
      - $ref: '#/channels/storeSync/messages/write'
    description: Client submits a write operation. Server assigns store_seq and echoes to all.

  receiveEvent:
    action: receive
    channel:
      $ref: '#/channels/storeSync'
    messages:
      - $ref: '#/channels/storeSync/messages/event'
    description: Server broadcasts canonical events to all connected clients.

  receiveError:
    action: receive
    channel:
      $ref: '#/channels/storeSync'
    messages:
      - $ref: '#/channels/storeSync/messages/error'

components:
  messages:
    Hello:
      name: hello
      contentType: application/x-msgpack
      payload:
        type: object
        required: [type, capver, device_id, token]
        properties:
          type:
            type: string
            const: hello
          capver:
            type: integer
            description: Client capability version
          device_id:
            type: string
            description: Unique device identifier
          token:
            type: string
            description: Authentication token (dust_tok_...)

    HelloResponse:
      name: hello_response
      payload:
        type: object
        required: [type, capver_min, capver_max, your_capver]
        properties:
          type:
            type: string
            const: hello_response
          capver_min:
            type: integer
          capver_max:
            type: integer
          your_capver:
            type: integer
          stores:
            type: array
            items:
              type: string
            description: Stores this token has access to

    Join:
      name: join
      payload:
        type: object
        required: [type, store, last_store_seq]
        properties:
          type:
            type: string
            const: join
          store:
            type: string
            description: Full store name (org/name) or store ID
          last_store_seq:
            type: integer
            description: Last store_seq the client has seen. Server sends events after this.

    Write:
      name: write
      payload:
        type: object
        required: [type, store, op, path, client_op_id]
        properties:
          type:
            type: string
            const: write
          store:
            type: string
          op:
            type: string
            enum: [set, delete, merge]
          path:
            type: string
            description: Dot-separated path (e.g. posts.hello.title)
          value: {}
          client_op_id:
            type: string
            description: Client-generated ID for optimistic reconciliation
          if_match:
            type: integer
            description: |
              Optional seq (revision) for compare-and-swap writes. If present, the
              write only succeeds if the target entry's current seq equals this
              value. Requires capver >= 2. Only supported on `set` ops with
              non-dict (leaf) values. On mismatch the server replies with
              `{error: {reason: "conflict", current_revision: N | null}}` and the
              write is not applied.

    WriteReply:
      name: write_reply
      description: |
        Reply to a write push. On success, returns the assigned `store_seq`.
        On failure, returns an `error` object with a `reason` code.
      payload:
        oneOf:
          - type: object
            required: [store_seq]
            properties:
              store_seq:
                type: integer
                description: Server-assigned monotonic seq for the accepted write.
          - type: object
            required: [error]
            properties:
              error:
                type: object
                required: [reason]
                properties:
                  reason:
                    type: string
                    enum:
                      - conflict
                      - capver_mismatch
                      - if_match_unsupported_op
                      - if_match_multi_leaf
                      - invalid_op
                      - unauthorized
                      - rate_limited
                    description: |
                      Failure reason code.
                      - `conflict`: `if_match` did not match the target entry's
                        current seq (or the path did not exist). No write happens.
                      - `capver_mismatch`: client sent `if_match` on a capver=1
                        session; CAS requires capver >= 2.
                      - `if_match_unsupported_op`: `if_match` was sent on an op
                        other than `set` (e.g. `delete`, `merge`).
                      - `if_match_multi_leaf`: `if_match` was sent on a `set` op
                        with a dict/map value, which would flatten to multiple
                        leaves and cannot be CAS'd atomically in Phase 5.
                  current_revision:
                    type: [integer, "null"]
                    description: |
                      Present on `conflict` replies. The entry's current seq, or
                      `null` if the entry does not exist.

    Event:
      name: event
      payload:
        type: object
        required: [type, store, store_seq, op, path, device_id, client_op_id]
        properties:
          type:
            type: string
            const: event
          store:
            type: string
          store_seq:
            type: integer
            description: Monotonically increasing server-assigned sequence number
          op:
            type: string
            enum: [set, delete, merge]
          path:
            type: string
          value: {}
          device_id:
            type: string
          client_op_id:
            type: string

    Error:
      name: error
      payload:
        type: object
        required: [type, code, message]
        properties:
          type:
            type: string
            const: error
          code:
            type: string
          message:
            type: string
