name: Elixir CI

on:
  push:
    branches: [master]
    paths:
      - 'server/**'
      - 'sdk/elixir/**'
      - 'sdk/elixir_ecto/**'
      - 'protocol/elixir/**'
      - '.github/workflows/elixir-ci.yml'
  pull_request:
    paths:
      - 'server/**'
      - 'sdk/elixir/**'
      - 'sdk/elixir_ecto/**'
      - 'protocol/elixir/**'
      - '.github/workflows/elixir-ci.yml'

env:
  # Opt JavaScript-based actions in to Node.js 24 ahead of GitHub's
  # 2026-09-16 forced cutover. Same as cli-ci.yml.
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'
  MIX_ENV: test
  # Pin Elixir/OTP centrally — every job inherits the same versions
  # so a "bump everywhere at once" change is a one-line edit.
  ELIXIR_VERSION: '1.18.4'
  OTP_VERSION: '27.3'

jobs:
  # Server gets its own job because it needs a Postgres service
  # container. The two SDK projects ride the matrix below.
  server:
    name: server
    runs-on: ubuntu-latest

    services:
      postgres:
        # Need PG 18+ for native uuidv7(). The EnableUuidv7 migration
        # probes for it and falls back to CREATE EXTENSION pg_uuidv7,
        # which isn't in any stock postgres image. uuidv7() is then
        # used as a column DEFAULT on several tables — not removable
        # without a schema rewrite.
        image: postgres:18
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v6

      - name: Install Elixir + OTP
        uses: erlef/setup-beam@v1
        with:
          elixir-version: ${{ env.ELIXIR_VERSION }}
          otp-version: ${{ env.OTP_VERSION }}

      - name: Cache deps + _build
        uses: actions/cache@v4
        with:
          path: |
            server/deps
            server/_build
          key: ${{ runner.os }}-mix-server-${{ hashFiles('server/mix.lock') }}
          restore-keys: |
            ${{ runner.os }}-mix-server-

      - name: Fetch deps
        working-directory: server
        run: mix deps.get

      - name: Compile
        working-directory: server
        run: mix compile

      # The root layout renders a PhoenixVite.Components.assets block
      # that reads priv/static/.vite/manifest.json. Locally that file
      # is produced by `mix assets.build` (which needs bun); in CI we
      # don't need real assets — every test that touches this code
      # path is asserting controller behaviour, not asset paths — so
      # we drop in a minimal manifest covering the two names the
      # layout references.
      - name: Write placeholder Vite manifest
        working-directory: server
        run: |
          mkdir -p priv/static/.vite
          cat > priv/static/.vite/manifest.json <<'JSON'
          {
            "js/app.js": { "file": "assets/app.js" },
            "css/app.css": { "file": "assets/app.css" }
          }
          JSON

      - name: Run tests
        working-directory: server
        run: mix test

  sdk:
    name: ${{ matrix.project }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - project: protocol/elixir
            dir: protocol/elixir
          - project: sdk/elixir
            dir: sdk/elixir
          - project: sdk/elixir_ecto
            dir: sdk/elixir_ecto

    steps:
      - uses: actions/checkout@v6

      - name: Install Elixir + OTP
        uses: erlef/setup-beam@v1
        with:
          elixir-version: ${{ env.ELIXIR_VERSION }}
          otp-version: ${{ env.OTP_VERSION }}

      - name: Cache deps + _build
        uses: actions/cache@v4
        with:
          path: |
            ${{ matrix.dir }}/deps
            ${{ matrix.dir }}/_build
          key: ${{ runner.os }}-mix-${{ matrix.project }}-${{ hashFiles(format('{0}/mix.lock', matrix.dir)) }}
          restore-keys: |
            ${{ runner.os }}-mix-${{ matrix.project }}-

      - name: Fetch deps
        working-directory: ${{ matrix.dir }}
        run: mix deps.get

      - name: Compile
        working-directory: ${{ matrix.dir }}
        run: mix compile

      - name: Run tests
        working-directory: ${{ matrix.dir }}
        run: mix test
